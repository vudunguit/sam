name: Android CI Test & Coverage

on:
  pull_request:
    branches: [ main, master ] # Chạy khi có PR vào nhánh chính

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests & Coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      # CÁCH CHÍNH CHỦ: Đẩy báo cáo lên tab Summary của GitHub
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/html/ # Đường dẫn đến bản HTML để bạn xem trực tiếp