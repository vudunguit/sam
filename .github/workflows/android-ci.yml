name: Android CI Test & Coverage

on:
  pull_request:
    branches: [ main, master ] # Chạy khi có PR vào nhánh chính

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Chạy Unit Test và tạo report Jacoco (sử dụng task bạn đã viết ở bước trước)
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest jacocoTestReport

      # Đẩy kết quả Test lên giao diện GitHub
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "**/test-results/**/*.xml"

      # Hiển thị Coverage Summary dưới dạng Comment trong PR
      - name: Jacoco Report to PR
        uses: irongrp/jacoco-report-action@v1.1.1
        with:
          paths: ${{ github.workspace }}/app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80 # Tùy chỉnh mức tối thiểu (Pipeline sẽ fail nếu thấp hơn)
          min-coverage-changed-files: 80